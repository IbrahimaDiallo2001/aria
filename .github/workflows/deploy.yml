# ============================================================
#  Aria — Déploiement automatique sur GitHub Pages.
#  À chaque push sur `main`, ce workflow compile la version
#  web de l'app et la publie sur https://<pseudo>.github.io/aria/
# ============================================================
name: Déployer Aria (web)

on:
  push:
    branches: [main]
  workflow_dispatch: # permet aussi un lancement manuel

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Dépendances
        run: flutter pub get

      - name: Compiler la version web
        # base-href calculé depuis le nom réel du dépôt (insensible aux renommages)
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - name: Préparer l'artefact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publier sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
